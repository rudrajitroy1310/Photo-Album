{% extends "main.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow border-0">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4 fw-bold text-success">Create Account</h2>
                    <p class="text-center text-muted small">Join our community as a member</p>
                    
                    <form method="post" novalidate>
                        {% csrf_token %}
                        
                        {% for field in form %}
                            <div class="mb-3">
                                <label class="form-label fw-bold small text-secondary">{{ field.label }}</label>
                                {{ field }}
                                {% if field.errors %}
                                    <div class="text-danger small mt-1">
                                        {{ field.errors|striptags }}
                                    </div>
                                {% endif %}
                            </div>
                        {% endfor %}

                        <div class="d-grid gap-2 mt-4">
                            <button type="submit" class="btn btn-success btn-lg">Sign Up</button>
                        </div>
                    </form>

                    <hr class="my-4">

                    <div class="text-center">
                        <p class="mb-0 text-muted">Already have an account?</p>
                        <a href="{% url 'login' %}" class="text-decoration-none fw-bold">Log in here</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
